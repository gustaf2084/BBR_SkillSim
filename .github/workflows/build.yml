name: Build EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Write VERSION from git tag
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "${GITHUB_REF#refs/tags/v}" > VERSION
          else
            echo "dev-${GITHUB_SHA::7}" > VERSION
          fi
          cat VERSION

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Build with PyInstaller
        working-directory: src
        run: |
          pyinstaller build_safe.spec

      - name: Package artifacts
        shell: bash
        run: |
          VER=$(cat VERSION)
          mkdir -p release
          cp src/dist/BBR_SkillSimulator.exe "release/BBR_SkillSimulator-v${VER}.exe"
          cp src/data.json release/
          cp src/perk_trees.json release/
          cp src/perk_i18n.json release/
          cp -r src/icons release/

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: BBR_SkillSimulator
          path: release/
